# /etc/nginx/sites-available/crm
# Замени crm.rutestin.com на свой поддомен, если он другой.

# HTTP → HTTPS (после получения SSL-сертификата certbot пропишет это автоматически)
server {
    listen 80;
    listen [::]:80;
    server_name crm.rutestin.com;

    # ACME-challenge для Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crm.rutestin.com;

    # SSL-сертификаты добавит certbot --nginx
    # ssl_certificate     /etc/letsencrypt/live/crm.rutestin.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/crm.rutestin.com/privkey.pem;

    # Лимит на загрузку файлов (фото товаров, печати, логотипы)
    client_max_body_size 25M;

    # Логи
    access_log /var/log/nginx/crm.access.log;
    error_log  /var/log/nginx/crm.error.log warn;

    # Статика React-фронта
    root /opt/crm/frontend/dist;
    index index.html;

    # API → FastAPI на 127.0.0.1:8001
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout                 300s;
        proxy_send_timeout                 300s;
    }

    # Загруженные файлы (логотипы отправителей, фото товаров)
    location /uploads/ {
        alias /opt/crm/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # SPA — все остальные пути отдаём index.html (для React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэшируем сборку фронта
    location ~* \.(js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
